<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todd R. Hardeman — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    font-family: 'Rajdhani', sans-serif;
  }

  .print-hint {
    color: rgba(126,216,209,0.5);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Exo 2', sans-serif;
  }

  /* Standard business card: 3.5" × 2" at 96dpi × 3 = 1008 × 576px */
  .card {
    width: 1008px;
    height: 576px;
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(126,216,209,0.15),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* ── Background: dark navy with subtle texture ── */
  .card-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 80% at 75% 50%, #0f2733 0%, #0a1520 60%, #060d14 100%);
  }

  /* Subtle grid texture */
  .card-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(126,216,209,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,216,209,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Teal gradient accent — left edge glow */
  .card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(45,112,116,0.18) 0%, transparent 50%),
      linear-gradient(to right, rgba(126,216,209,0.06) 0%, transparent 40%);
  }

  /* ── Teal accent bar — left edge ── */
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(to bottom,
      transparent 0%,
      #7ed8d1 20%,
      #2d7074 50%,
      #7ed8d1 80%,
      transparent 100%);
    opacity: 0.9;
  }

  /* ── Logo area — left side ── */
  .logo-area {
    position: absolute;
    left: 55px;
    top: 50%;
    transform: translateY(-50%);
    width: 210px;
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-area svg {
    width: 100%;
    height: 100%;
  }

  /* ── Divider line ── */
  .divider {
    position: absolute;
    left: 290px;
    top: 15%;
    bottom: 15%;
    width: 1px;
    background: linear-gradient(to bottom,
      transparent,
      rgba(126,216,209,0.3) 30%,
      rgba(126,216,209,0.5) 50%,
      rgba(126,216,209,0.3) 70%,
      transparent);
  }

  /* ── Text area — right side ── */
  .text-area {
    position: absolute;
    left: 320px;
    right: 55px;
    top: 50%;
    transform: translateY(-50%);
  }

  .name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 46px;
    line-height: 1;
    letter-spacing: 0.04em;
    color: #ffffff;
    margin-bottom: 4px;
    text-shadow: 0 2px 20px rgba(126,216,209,0.2);
  }

  .name .last {
    color: #7ed8d1;
  }

  .title-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 18px;
  }

  .title-dot {
    width: 5px;
    height: 5px;
    background: #7ed8d1;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(126,216,209,0.8);
  }

  .title {
    font-family: 'Exo 2', sans-serif;
    font-weight: 300;
    font-size: 15.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(126,216,209,0.85);
    line-height: 1.4;
  }

  /* ── Decorative hex motif (corner) ── */
  .hex-corner {
    position: absolute;
    bottom: 24px;
    right: 32px;
    opacity: 0.07;
    width: 90px;
    height: 90px;
  }

  .hex-corner svg {
    width: 100%;
    height: 100%;
  }

  /* ── Thin teal rule under name ── */
  .name-rule {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, #7ed8d1, transparent);
    margin: 8px 0 0 0;
    border-radius: 2px;
  }

  /* ── AR scan prompt ── */
  .ar-prompt {
    position: absolute;
    bottom: 26px;
    left: 320px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ar-icon {
    width: 22px;
    height: 22px;
    border: 1.5px solid rgba(126,216,209,0.5);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ar-icon::after {
    content: '';
    width: 8px;
    height: 8px;
    border: 1.5px solid #7ed8d1;
    border-radius: 1px;
  }

  .ar-text {
    font-family: 'Exo 2', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(126,216,209,0.45);
  }

  /* ── Corner marks (print registration) ── */
  .corner { position: absolute; width: 14px; height: 14px; }
  .corner-tl { top: 14px; left: 14px; border-top: 1.5px solid rgba(126,216,209,0.25); border-left: 1.5px solid rgba(126,216,209,0.25); }
  .corner-tr { top: 14px; right: 14px; border-top: 1.5px solid rgba(126,216,209,0.25); border-right: 1.5px solid rgba(126,216,209,0.25); }
  .corner-bl { bottom: 14px; left: 14px; border-bottom: 1.5px solid rgba(126,216,209,0.25); border-left: 1.5px solid rgba(126,216,209,0.25); }
  .corner-br { bottom: 14px; right: 14px; border-bottom: 1.5px solid rgba(126,216,209,0.25); border-right: 1.5px solid rgba(126,216,209,0.25); }

  @media print {
    body { background: white; padding: 0; gap: 0; min-height: auto; }
    .print-hint { display: none; }
    .card { box-shadow: none; border: 0.5pt solid #ccc; }
  }
</style>
</head>
