<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Business Card</title>

  <!-- Mobile viewport fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- MindAR (ONLY this one) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Optional: prevents animation glitches */
    #logo-renderer {
      animation: none !important;
    }
  </style>
</head>

<body>

  <a-scene
    mindar-image="imageTargetSrc: card.mind; autoStart: true;"
    embedded
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Replace this with your real content -->
      <a-plane
        position="0 0 0"
        height="0.6"
        width="1"
        color="#0077ff"
        opacity="0.8"
      ></a-plane>

      <!-- Example text -->
      <a-text
        value="Your AR Business Card"
        position="0 0 0.1"
        align="center"
        color="#FFF"
        width="2"
      ></a-text>

    </a-entity>

  </a-scene>

</body>
</html>
