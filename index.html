<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Business Card</title>

  <!-- ✅ FIX: mobile viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- your original scripts (unchanged except duplicate removed if present) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    /* your existing styles stay */

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    /* ✅ FIX: fullscreen camera */
    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
    }

    /* ✅ FIX: this was previously leaking into AR */
    #logo-renderer {
      animation: none !important;
    }
  </style>
</head>

<body>

  <!-- your original scene, only autoStart added -->
  <a-scene
    mindar-image="imageTargetSrc: card.mind; autoStart: true;"
    embedded
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- your original AR target + content UNCHANGED -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- KEEP YOUR ORIGINAL CONTENT HERE -->
      <a-entity id="logo-renderer">
        <!-- your animation code remains exactly as you had it -->
      </a-entity>

    </a-entity>

  </a-scene>

</body>
</html>
