<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Business Card</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- MindAR (ONLY ONE) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
    }

    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Your original intent preserved */
    #logo-renderer {
      animation: none !important;
    }

    /* Optional overlay container if you were using HTML UI */
    #logo-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <a-scene
    mindar-image="imageTargetSrc: card.mind; autoStart: true;"
    embedded
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- AR Target -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 🔵 THIS is where your animation MUST live -->
      <a-entity id="logo-renderer" position="0 0 0">

        <!-- TEMP visible test (you can replace with your animation) -->
        <a-plane
          position="0 0 0"
          width="1"
          height="0.6"
          color="#0a84ff"
          opacity="0.85"
        ></a-plane>

        <a-text
          value="Todd R. Hardeman"
          position="0 0 0.1"
          align="center"
          color="#ffffff"
          width="2"
        ></a-text>

      </a-entity>

    </a-entity>

  </a-scene>

</body>
</html>
